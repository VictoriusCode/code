<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact - Victorius Code</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family:'Inter',sans-serif;
      background:#0a0a0a;
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
      text-align:center;
    }

    h1 {
      font-family:'Orbitron',sans-serif;
      margin-bottom:20px;
      text-shadow:0 0 10px #00f0ff;
    }

    .container {
      background:rgba(255,255,255,0.05);
      padding:40px;
      border-radius:15px;
      border:1px solid rgba(255,255,255,0.1);
    }

    a {
      display:block;
      margin:15px 0;
      color:#00f0ff;
      text-decoration:none;
      font-size:1.1rem;
      transition:0.3s;
    }

    a:hover {
      color:white;
      transform:scale(1.05);
    }

  </style>
</head>

<body>

  <div class="container">
    <h1>Contact Me</h1>

    <a href="mailto:victoriuscodebusiness@proton.com">
      Email: victoriuscodebusiness@proton.com
    </a>

    <a href="https://fiver.com/victoriuscode" target="_blank">
      Fiverr: fiver.com/victoriuscode
    </a>
  </div>

</body>
</html>
